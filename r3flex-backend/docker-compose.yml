version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: r3flex_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-r3flex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-r3flex_secret}
      POSTGRES_DB: ${POSTGRES_DB:-r3flex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-r3flex} -d ${POSTGRES_DB:-r3flex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: r3flex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: r3flex_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-r3flex}:${POSTGRES_PASSWORD:-r3flex_secret}@db:5432/${POSTGRES_DB:-r3flex}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

volumes:
  postgres_data:
  redis_data:
