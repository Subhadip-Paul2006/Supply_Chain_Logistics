# Alembic configuration file.
# This file is read by 'alembic' commands.
# It references app/config.py for the actual database URL.

[alembic]
# Path to migration scripts
script_location = alembic

# File naming template for new migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of auto-generated slugs in filenames
truncate_slug_length = 40

# Version path separator — use os.pathsep
version_path_separator = os

[post_write_hooks]
# Not enabled — add black/ruff formatting here if desired

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
